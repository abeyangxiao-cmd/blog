<svg width="960" height="360" viewBox="0 0 960 360" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg2" x1="0" y1="0" x2="960" y2="360">
      <stop offset="0" stop-color="#0F172A"/>
      <stop offset="1" stop-color="#1E293B"/>
    </linearGradient>
    <filter id="ds2"><feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.2"/></filter>
  </defs>
  <rect width="960" height="360" rx="16" fill="url(#bg2)"/>

  <text x="480" y="40" text-anchor="middle" fill="#F8FAFC" font-size="20" font-weight="700" font-family="system-ui">信息源三级架构</text>

  <!-- Level 1: Core -->
  <rect x="60" y="70" width="840" height="80" rx="12" fill="#1E3A5F" filter="url(#ds2)" opacity="0.95"/>
  <text x="100" y="96" fill="#38BDF8" font-size="15" font-weight="700" font-family="system-ui">🔵 核心层 — Twitter/X KOL</text>
  <text x="100" y="118" fill="#CBD5E1" font-size="12" font-family="system-ui">公司官方: @OpenAI  @AnthropicAI  @GoogleDeepMind  @MistralAI  @xai  @huggingface</text>
  <text x="100" y="138" fill="#CBD5E1" font-size="12" font-family="system-ui">行业领袖: @sama  @karpathy  @AndrewYNg  @ylecun    资讯聚合: @rowancheung  @therundownai    观点: @GaryMarcus</text>

  <!-- Priority bar -->
  <rect x="780" y="85" width="100" height="24" rx="12" fill="#0EA5E9"/>
  <text x="830" y="102" text-anchor="middle" fill="#FFF" font-size="11" font-weight="700" font-family="system-ui">最高优先</text>

  <!-- Level 2: Supplement -->
  <rect x="120" y="170" width="720" height="60" rx="12" fill="#312E81" filter="url(#ds2)" opacity="0.9"/>
  <text x="160" y="196" fill="#A78BFA" font-size="15" font-weight="700" font-family="system-ui">🟣 补充层 — 海外科技媒体</text>
  <text x="160" y="218" fill="#C4B5FD" font-size="12" font-family="system-ui">TechCrunch · The Verge · Ars Technica · VentureBeat · SCMP · Rest of World</text>

  <rect x="720" y="183" width="100" height="24" rx="12" fill="#7C3AED"/>
  <text x="770" y="200" text-anchor="middle" fill="#FFF" font-size="11" font-weight="700" font-family="system-ui">补充覆盖</text>

  <!-- Level 3: Fallback -->
  <rect x="180" y="250" width="600" height="56" rx="12" fill="#14532D" filter="url(#ds2)" opacity="0.85"/>
  <text x="220" y="276" fill="#4ADE80" font-size="15" font-weight="700" font-family="system-ui">🟢 兜底层 — Brave 搜索</text>
  <text x="220" y="296" fill="#BBF7D0" font-size="12" font-family="system-ui">中英双语关键词 · 补充中国 AI 公司动态 · freshness: 24h</text>

  <rect x="660" y="263" width="100" height="24" rx="12" fill="#16A34A"/>
  <text x="710" y="280" text-anchor="middle" fill="#FFF" font-size="11" font-weight="700" font-family="system-ui">兜底补漏</text>

  <!-- Arrows -->
  <path d="M480 150 L480 170" stroke="#475569" stroke-width="2" stroke-dasharray="4,3"/>
  <path d="M480 230 L480 250" stroke="#475569" stroke-width="2" stroke-dasharray="4,3"/>

  <!-- Bottom label -->
  <text x="480" y="340" text-anchor="middle" fill="#64748B" font-size="11" font-family="system-ui">越往上信息越快、越一手；越往下覆盖面越广、越兜底</text>
</svg>
