<svg width="960" height="380" viewBox="0 0 960 380" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg6" x1="0" y1="0" x2="960" y2="380">
      <stop offset="0" stop-color="#0F172A"/>
      <stop offset="1" stop-color="#1E293B"/>
    </linearGradient>
    <filter id="ds6"><feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.2"/></filter>
    <marker id="ar6" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6" fill="#64748B"/></marker>
  </defs>
  <rect width="960" height="380" rx="16" fill="url(#bg6)"/>

  <text x="480" y="38" text-anchor="middle" fill="#F8FAFC" font-size="20" font-weight="700" font-family="system-ui">一套框架 · 多主题扩展</text>

  <!-- Core framework -->
  <rect x="300" y="60" width="360" height="64" rx="12" fill="#7C3AED" filter="url(#ds6)"/>
  <text x="480" y="88" text-anchor="middle" fill="#FFF" font-size="15" font-weight="700" font-family="system-ui">🏗 Agent 框架（不变）</text>
  <text x="480" y="112" text-anchor="middle" fill="#DDD6FE" font-size="12" font-family="system-ui">采集 → 处理 → 输出 · Skills 复用</text>

  <!-- 3 config blocks -->
  <text x="480" y="150" text-anchor="middle" fill="#94A3B8" font-size="12" font-family="system-ui">只替换三样东西 ▾</text>

  <rect x="100" y="168" width="240" height="48" rx="8" fill="#1E3A5F" filter="url(#ds6)"/>
  <text x="220" y="198" text-anchor="middle" fill="#38BDF8" font-size="13" font-weight="700" font-family="system-ui">📋 信息源配置</text>

  <rect x="360" y="168" width="240" height="48" rx="8" fill="#1E3A5F" filter="url(#ds6)"/>
  <text x="480" y="198" text-anchor="middle" fill="#38BDF8" font-size="13" font-weight="700" font-family="system-ui">🎯 筛选规则</text>

  <rect x="620" y="168" width="240" height="48" rx="8" fill="#1E3A5F" filter="url(#ds6)"/>
  <text x="740" y="198" text-anchor="middle" fill="#38BDF8" font-size="13" font-weight="700" font-family="system-ui">📡 输出渠道</text>

  <!-- Arrow down -->
  <text x="480" y="244" text-anchor="middle" fill="#94A3B8" font-size="12" font-family="system-ui">= 不同主题的日报 ▾</text>

  <!-- 4 topic outputs -->
  <rect x="60" y="264" width="195" height="72" rx="10" fill="#14532D" filter="url(#ds6)"/>
  <text x="157" y="292" text-anchor="middle" fill="#4ADE80" font-size="14" font-weight="700" font-family="system-ui">🤖 AI 日报</text>
  <text x="157" y="310" text-anchor="middle" fill="#86EFAC" font-size="11" font-family="system-ui">Twitter AI KOL</text>
  <text x="157" y="326" text-anchor="middle" fill="#86EFAC" font-size="11" font-family="system-ui">运行中 ✅</text>

  <rect x="275" y="264" width="195" height="72" rx="10" fill="#1C1917" filter="url(#ds6)" stroke="#475569" stroke-dasharray="4,3"/>
  <text x="372" y="292" text-anchor="middle" fill="#FB923C" font-size="14" font-weight="700" font-family="system-ui">📊 宏观经济</text>
  <text x="372" y="310" text-anchor="middle" fill="#FDBA74" font-size="11" font-family="system-ui">央行 / 政策 / 数据</text>
  <text x="372" y="326" text-anchor="middle" fill="#78716C" font-size="11" font-family="system-ui">规划中</text>

  <rect x="490" y="264" width="195" height="72" rx="10" fill="#1C1917" filter="url(#ds6)" stroke="#475569" stroke-dasharray="4,3"/>
  <text x="587" y="292" text-anchor="middle" fill="#FB923C" font-size="14" font-weight="700" font-family="system-ui">🚀 出海动态</text>
  <text x="587" y="310" text-anchor="middle" fill="#FDBA74" font-size="11" font-family="system-ui">东南亚 / 中东 / 拉美</text>
  <text x="587" y="326" text-anchor="middle" fill="#78716C" font-size="11" font-family="system-ui">规划中</text>

  <rect x="705" y="264" width="195" height="72" rx="10" fill="#1C1917" filter="url(#ds6)" stroke="#475569" stroke-dasharray="4,3"/>
  <text x="802" y="292" text-anchor="middle" fill="#FB923C" font-size="14" font-weight="700" font-family="system-ui">🛒 电商趋势</text>
  <text x="802" y="310" text-anchor="middle" fill="#FDBA74" font-size="11" font-family="system-ui">Amazon / TikTok Shop</text>
  <text x="802" y="326" text-anchor="middle" fill="#78716C" font-size="11" font-family="system-ui">规划中</text>

  <text x="480" y="366" text-anchor="middle" fill="#64748B" font-size="11" font-family="system-ui">一个 Agent 框架 + N 套配置 = N 份不同的日报</text>
</svg>
