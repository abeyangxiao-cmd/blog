<svg width="960" height="480" viewBox="0 0 960 480" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="g1" x1="0" y1="0" x2="960" y2="480">
      <stop offset="0" stop-color="#0F172A"/>
      <stop offset="1" stop-color="#1E293B"/>
    </linearGradient>
    <filter id="ds"><feDropShadow dx="0" dy="2" stdDeviation="4" flood-opacity="0.25"/></filter>
  </defs>
  <rect width="960" height="480" rx="16" fill="url(#g1)"/>

  <!-- Title -->
  <text x="480" y="44" text-anchor="middle" fill="#F8FAFC" font-size="22" font-weight="700" font-family="system-ui, -apple-system, sans-serif">AI Daily Digest · System Architecture</text>

  <!-- Layer labels -->
  <text x="60" y="120" fill="#94A3B8" font-size="13" font-weight="600" font-family="system-ui">Collection Layer</text>
  <text x="60" y="250" fill="#94A3B8" font-size="13" font-weight="600" font-family="system-ui">Processing Layer</text>
  <text x="60" y="380" fill="#94A3B8" font-size="13" font-weight="600" font-family="system-ui">Output Layer</text>

  <!-- Collect: 3 boxes -->
  <rect x="140" y="80" width="220" height="64" rx="10" fill="#1E3A5F" filter="url(#ds)"/>
  <text x="250" y="107" text-anchor="middle" fill="#38BDF8" font-size="14" font-weight="700" font-family="system-ui">🐦 Twitter KOL</text>
  <text x="250" y="128" text-anchor="middle" fill="#CBD5E1" font-size="12" font-family="system-ui">30+ accounts · Core source</text>

  <rect x="380" y="80" width="220" height="64" rx="10" fill="#1E3A5F" filter="url(#ds)"/>
  <text x="490" y="107" text-anchor="middle" fill="#38BDF8" font-size="14" font-weight="700" font-family="system-ui">📰 Overseas Media</text>
  <text x="490" y="128" text-anchor="middle" fill="#CBD5E1" font-size="12" font-family="system-ui">TechCrunch · The Verge · 4 sites</text>

  <rect x="620" y="80" width="220" height="64" rx="10" fill="#1E3A5F" filter="url(#ds)"/>
  <text x="730" y="107" text-anchor="middle" fill="#38BDF8" font-size="14" font-weight="700" font-family="system-ui">🔍 Brave Search</text>
  <text x="730" y="128" text-anchor="middle" fill="#CBD5E1" font-size="12" font-family="system-ui">Bilingual · Fallback</text>

  <!-- Arrows down -->
  <path d="M250 144 L250 170 L490 170 L490 210" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  <path d="M490 144 L490 210" stroke="#475569" stroke-width="2"/>
  <path d="M730 144 L730 170 L490 170" stroke="#475569" stroke-width="2"/>

  <defs><marker id="arrow" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6" fill="#475569"/></marker></defs>

  <!-- Process: center box -->
  <rect x="260" y="210" width="460" height="72" rx="12" fill="#312E81" filter="url(#ds)"/>
  <text x="490" y="238" text-anchor="middle" fill="#A78BFA" font-size="15" font-weight="700" font-family="system-ui">🧠 Collector Bot b (Agent)</text>
  <text x="490" y="260" text-anchor="middle" fill="#C4B5FD" font-size="12" font-family="system-ui">Dedup → Time Window Filter → Priority Ranking → Formatted Output</text>
  <text x="490" y="275" text-anchor="middle" fill="#7C3AED" font-size="11" font-family="system-ui">Daily 06:00 auto-trigger · Anti-rate-limit</text>

  <!-- Arrows down to output -->
  <path d="M390 282 L390 340" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  <path d="M590 282 L590 340" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Output: 2 boxes -->
  <rect x="260" y="340" width="220" height="72" rx="10" fill="#14532D" filter="url(#ds)"/>
  <text x="370" y="368" text-anchor="middle" fill="#4ADE80" font-size="14" font-weight="700" font-family="system-ui">💬 Lark Summary</text>
  <text x="370" y="389" text-anchor="middle" fill="#BBF7D0" font-size="12" font-family="system-ui">8-10 items · 1-min overview</text>
  <text x="370" y="404" text-anchor="middle" fill="#86EFAC" font-size="11" font-family="system-ui">Webhook auto-push</text>

  <rect x="500" y="340" width="220" height="72" rx="10" fill="#14532D" filter="url(#ds)"/>
  <text x="610" y="368" text-anchor="middle" fill="#4ADE80" font-size="14" font-weight="700" font-family="system-ui">📄 Gist Detailed Report</text>
  <text x="610" y="389" text-anchor="middle" fill="#BBF7D0" font-size="12" font-family="system-ui">Deep analysis · Source links</text>
  <text x="610" y="404" text-anchor="middle" fill="#86EFAC" font-size="11" font-family="system-ui">Permanent archive · Traceable</text>

  <!-- TG reminder -->
  <rect x="740" y="352" width="160" height="48" rx="8" fill="#1C1917" filter="url(#ds)"/>
  <text x="820" y="376" text-anchor="middle" fill="#FB923C" font-size="12" font-weight="600" font-family="system-ui">📱 TG Reminder</text>
  <text x="820" y="393" text-anchor="middle" fill="#FDBA74" font-size="11" font-family="system-ui">"Digest sent"</text>
  <path d="M720 376 L740 376" stroke="#475569" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Bottom note -->
  <text x="480" y="458" text-anchor="middle" fill="#64748B" font-size="11" font-family="system-ui">Mac Mini · OpenClaw · Bird CLI · GitHub CLI · Lark Webhook</text>
</svg>
