    </linearGradient>
  </defs>
  <rect width="960" height="340" rx="16" fill="url(#bg3)"/>

  <text x="480" y="40" text-anchor="middle" fill="#F8FAFC" font-size="20" font-weight="700" font-family="system-ui">优先级排序模型</text>

  <!-- 5 bars with decreasing width -->
  <rect x="120" y="70" width="720" height="40" rx="8" fill="#DC2626"/>
