  <text x="790" y="96" text-anchor="end" fill="#FECACA" font-size="12" font-family="system-ui">权重最高</text>

  <rect x="160" y="120" width="640" height="40" rx="8" fill="#EA580C"/>
  <text x="180" y="146" fill="#FFF" font-size="14" font-weight="700" font-family="system-ui">P2  大额融资 / 收购 / 战略合作</text>

  <rect x="200" y="170" width="560" height="40" rx="8" fill="#D97706"/>
